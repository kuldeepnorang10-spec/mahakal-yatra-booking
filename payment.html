<script>
        function copyTxn() {
            const el = document.createElement('textarea');
            el.value = 'TXN-99821';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            // Minimalist feedback
            const btn = event.currentTarget;
            const icon = btn.querySelector('.material-symbols-outlined');
            const originalIcon = icon.innerText;
            icon.innerText = 'check';
            icon.classList.add('text-saffron-vibrant');
            setTimeout(() => {
                icon.innerText = originalIcon;
                icon.classList.remove('text-saffron-vibrant');
            }, 2000);
        }

        // Parallax depth effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.glass-card');
            const mascot = document.querySelector('.animate-float');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;

            cards.forEach(card => {
                card.style.transform = `translateX(${x}px) translateY(${y}px)`;
            });
            
            if(mascot) {
                mascot.style.transform = `translateX(${-x * 2}px) translateY(${-y * 2}px) rotate(-2deg)`;
            }
        });
    </script>
